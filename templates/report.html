<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>
  <style>
    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --border: #e8e4dc;
      --text: #1c1917;
      --muted: #78716c;
      --accent: #2563eb;
      --pass: #059669;
      --warn: #d97706;
      --fail: #dc2626;
      --pillar-conversion: #2563eb;
      --pillar-aov: #7c3aed;
      --pillar-retention: #059669;
      --pillar-acquisition: #d97706;
      --pillar-performance: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      line-height: 1.55;
      font-size: 15px;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 2rem 1.5rem 3rem; }
    header { margin-bottom: 2rem; }
    h1 { font-size: 1.65rem; font-weight: 650; margin: 0 0 0.35rem; letter-spacing: -0.02em; color: var(--text); }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin: 0; }
    .store-tag {
      display: inline-block; margin-top: 0.75rem;
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase; color: var(--accent);
      background: #eff6ff; padding: 0.25rem 0.6rem; border-radius: 999px;
    }

    /* KPI strip */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.85rem;
      margin-bottom: 1.75rem;
    }
    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.1rem;
      box-shadow: 0 1px 2px rgba(28,25,23,0.04);
    }
    .kpi-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.35rem; }
    .kpi-value { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1.1; }
    .kpi-value small { font-size: 0.95rem; font-weight: 600; color: var(--muted); }
    .kpi-sub { font-size: 0.78rem; color: var(--muted); margin-top: 0.25rem; }

    /* Charts row */
    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    @media (max-width: 640px) { .charts { grid-template-columns: 1fr; } }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
      box-shadow: 0 1px 2px rgba(28,25,23,0.04);
    }
    .chart-title { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.85rem; }
    .bar-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.45rem; font-size: 0.82rem; }
    .bar-label { width: 5.5rem; flex-shrink: 0; color: var(--muted); font-weight: 500; }
    .bar-track { flex: 1; height: 8px; background: #f0ebe3; border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; min-width: 2px; }
    .bar-count { width: 1.5rem; text-align: right; font-weight: 600; font-size: 0.8rem; color: var(--text); }

    /* Donut */
    .donut-wrap { display: flex; align-items: center; gap: 1.25rem; }
    .donut {
      width: 88px; height: 88px; border-radius: 50%;
      background: conic-gradient(
        var(--pass) 0deg {{TECH_PASS_DEG}}deg,
        var(--warn) {{TECH_PASS_DEG}}deg {{TECH_WARN_END_DEG}}deg,
        var(--fail) {{TECH_WARN_END_DEG}}deg 360deg
      );
      position: relative; flex-shrink: 0;
    }
    .donut::after {
      content: ""; position: absolute; inset: 18px;
      background: var(--surface); border-radius: 50%;
    }
    .donut-legend { font-size: 0.82rem; }
    .legend-item { display: flex; align-items: center; gap: 0.45rem; margin-bottom: 0.35rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    section { margin-bottom: 2.25rem; }
    h2 {
      font-size: 0.78rem; font-weight: 650;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); margin: 0 0 1rem;
      padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
    }
    .prose {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.35rem;
      box-shadow: 0 1px 2px rgba(28,25,23,0.04);
    }
    .prose p { margin: 0 0 0.85rem; }
    .prose p:last-child { margin-bottom: 0; }
    .prose strong { color: var(--text); font-weight: 650; }

    .card {
      background: var(--surface);
      border-radius: 12px;
      padding: 1.15rem 1.25rem;
      margin-bottom: 0.85rem;
      border: 1px solid var(--border);
      box-shadow: 0 1px 2px rgba(28,25,23,0.04);
    }
    .card-head { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; margin-bottom: 0.65rem; }
    .card h3 { margin: 0; font-size: 1rem; font-weight: 650; flex: 1 1 100%; letter-spacing: -0.01em; }
    .badge {
      display: inline-block; font-size: 0.68rem; font-weight: 650;
      padding: 0.2rem 0.55rem; border-radius: 999px;
      letter-spacing: 0.03em; text-transform: uppercase;
    }
    .badge-Conversion { background: #eff6ff; color: var(--pillar-conversion); }
    .badge-AOV { background: #f5f3ff; color: var(--pillar-aov); }
    .badge-Retention { background: #ecfdf5; color: var(--pillar-retention); }
    .badge-Acquisition { background: #fffbeb; color: var(--pillar-acquisition); }
    .badge-Performance { background: #fef2f2; color: var(--pillar-performance); }
    .pill {
      font-size: 0.72rem; font-weight: 600; padding: 0.15rem 0.5rem;
      border-radius: 6px; background: #f5f5f4; color: var(--muted);
    }
    .pill-lift { background: #ecfdf5; color: var(--pass); }
    dl { display: grid; grid-template-columns: 9.5rem 1fr; gap: 0.3rem 1rem; margin: 0; font-size: 0.88rem; }
    dt { color: var(--muted); font-weight: 500; }
    dd { margin: 0; }
    .evidence-images { margin-top: 0.65rem; display: flex; flex-wrap: wrap; gap: 0.65rem; }
    .evidence-shot {
      max-width: 100%; width: auto; max-height: 280px;
      border-radius: 8px; border: 1px solid var(--border);
      box-shadow: 0 1px 3px rgba(28,25,23,0.06);
    }
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(28,25,23,0.04);
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    th, td { padding: 0.6rem 0.85rem; text-align: left; vertical-align: top; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    th { background: #fafaf9; color: var(--muted); font-weight: 650; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; }
    tr:hover td { background: #fafaf9; }
    .status-Pass { color: var(--pass); font-weight: 650; }
    .status-Warn { color: var(--warn); font-weight: 650; }
    .status-Fail { color: var(--fail); font-weight: 650; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>{{TITLE}}</h1>
      <p class="subtitle">Qosmic storefront audit · {{GENERATED_AT}}</p>
      <span class="store-tag">{{STORE_SLUG}}</span>
    </header>

    {{KPI_DASHBOARD}}

    <section>
      <h2>Executive summary</h2>
      <div class="prose">{{EXECUTIVE_SUMMARY}}</div>
    </section>

    <section>
      <h2>Proposed experiments</h2>
      {{EXPERIMENTS}}
    </section>

    <section>
      <h2>Competitor analysis</h2>
      <div class="table-wrap">{{COMPETITORS}}</div>
    </section>

    <section>
      <h2>Technical checks</h2>
      <div class="table-wrap">{{TECHNICAL}}</div>
    </section>
  </div>
</body>
</html>
